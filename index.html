<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNO</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fff; color: #000; font-family: sans-serif; padding: 10px; }
h2 { font-size: 24px; border-bottom: 2px solid #000; padding-bottom: 6px; margin-bottom: 10px; }
#msg { border: 2px solid #000; padding: 8px; font-size: 16px; margin-bottom: 10px; min-height: 42px; }
.row { margin-bottom: 12px; }
.lbl { font-size: 14px; margin-bottom: 4px; }
.hand { white-space: nowrap; overflow-x: auto; padding: 4px 0; }
.card {
  display: inline-block;
  width: 62px; height: 90px;
  margin: 3px;
  font-size: 13px; font-weight: bold;
  text-align: center; vertical-align: top;
  padding: 6px 2px;
  white-space: pre-wrap; word-break: break-all;
  cursor: pointer;
}
.card-r { border: 4px solid #000; }
.card-b { border: 3px dashed #000; }
.card-g { border: 4px double #000; }
.card-y { border: 3px dotted #000; }
.card-w { border: 3px solid #000; background: #000; color: #fff; }
.card-top {
  display: inline-block; width: 74px; height: 106px;
  font-size: 16px; text-align: center;
  padding: 8px 4px; font-weight: bold;
  white-space: pre-wrap; word-break: break-all;
  vertical-align: middle;
}
.dim { opacity: 0.4; cursor: default; }
button.act {
  font-size: 17px; padding: 10px 18px; margin: 3px;
  border: 2px solid #000; background: #fff; cursor: pointer;
}
button.act:disabled { opacity: 0.4; cursor: default; }
#cpick { display: none; border: 2px solid #000; padding: 8px; margin-bottom: 10px; }
#cpick button { font-size: 18px; padding: 12px 22px; margin: 4px; border: 2px solid #000; background: #fff; cursor: pointer; }
</style>
</head>
<body>
<h2>UNO</h2>
<div id="msg"></div>

<div class="row">
  <span class="lbl">電腦手牌：</span>
  <span id="ai-cnt" style="font-size:20px; font-weight:bold;"></span> 張
</div>

<div class="row">
  <span class="lbl">頂牌：</span>
  <span id="top" class="card-top"></span>
  <span style="margin-left:14px; font-size:16px;">顏色：<b id="cur-col"></b></span>
</div>

<div id="cpick">
  選顏色：
  <button onclick="pickColor('R')">紅</button>
  <button onclick="pickColor('B')">藍</button>
  <button onclick="pickColor('G')">綠</button>
  <button onclick="pickColor('Y')">黃</button>
</div>

<div class="row">
  <div class="lbl">你的手牌：</div>
  <div id="hand" class="hand"></div>
</div>

<div class="row">
  <button class="act" id="btn-draw" onclick="playerDraw()">摸牌</button>
  <button class="act" id="btn-uno" onclick="sayUno()" style="display:none;">UNO!</button>
  <button class="act" onclick="startGame()" style="margin-left:16px;">重開</button>
</div>

<script>
// Card types
var TN='n', TS='s', TR='r', TD='d2', TW='w', TW4='w4';
// Colors
var CR='R', CB='B', CG='G', CY='Y', CX='W';

var G; // global game state

function mk(c, t, n) { return {c: c, t: t, n: n || 0}; }

function mkDeck() {
  var d = [], i, ci, col, cols = [CR, CB, CG, CY];
  for (ci = 0; ci < 4; ci++) {
    col = cols[ci];
    d.push(mk(col, TN, 0));
    for (i = 1; i <= 9; i++) { d.push(mk(col, TN, i)); d.push(mk(col, TN, i)); }
    d.push(mk(col, TS)); d.push(mk(col, TS));
    d.push(mk(col, TR)); d.push(mk(col, TR));
    d.push(mk(col, TD)); d.push(mk(col, TD));
  }
  for (i = 0; i < 4; i++) { d.push(mk(CX, TW)); d.push(mk(CX, TW4)); }
  return d;
}

function shuffle(a) {
  var i, j, t;
  for (i = a.length - 1; i > 0; i--) {
    j = Math.floor(Math.random() * (i + 1));
    t = a[i]; a[i] = a[j]; a[j] = t;
  }
}

function draw1() {
  if (!G.deck.length) {
    var top = G.disc.pop();
    G.deck = G.disc; G.disc = [top];
    shuffle(G.deck);
  }
  return G.deck.pop();
}

function canPlay(card) {
  if (card.t === TW || card.t === TW4) return true;
  if (card.c === G.col) return true;
  var top = G.disc[G.disc.length - 1];
  if (card.t === TN && top.t === TN && card.n === top.n) return true;
  if (card.t !== TN && top.t === card.t) return true;
  return false;
}

function lbl(card) {
  var cn = {R:'紅', B:'藍', G:'綠', Y:'黃', W:''};
  if (card.t === TN)  return cn[card.c] + card.n;
  if (card.t === TS)  return cn[card.c] + '\nSkip';
  if (card.t === TR)  return cn[card.c] + '\nRev';
  if (card.t === TD)  return cn[card.c] + '\n+2';
  if (card.t === TW)  return '變色';
  if (card.t === TW4) return '變色\n+4';
  return '?';
}

function cls(card) {
  if (card.t === TW || card.t === TW4) return 'card card-w';
  return {R:'card card-r', B:'card card-b', G:'card card-g', Y:'card card-y'}[card.c] || 'card';
}

function colName(c) { return {R:'紅', B:'藍', G:'綠', Y:'黃'}[c] || c; }
function setMsg(s) { document.getElementById('msg').textContent = s; }

function render() {
  var top = G.disc[G.disc.length - 1];
  var el = document.getElementById('top');
  el.className = 'card-top ' + cls(top);
  el.textContent = lbl(top);
  document.getElementById('cur-col').textContent = colName(G.col);
  document.getElementById('ai-cnt').textContent = G.ai.length;

  var hand = document.getElementById('hand');
  hand.innerHTML = '';
  var active = (G.turn === 0 && G.phase === 'play');
  for (var i = 0; i < G.ph.length; i++) {
    (function(idx) {
      var card = G.ph[idx];
      var playable = active && canPlay(card);
      var div = document.createElement('div');
      div.className = cls(card) + (playable ? '' : ' dim');
      div.textContent = lbl(card);
      if (playable) {
        div.onclick = function() { playerPlay(idx); };
      }
      hand.appendChild(div);
    })(i);
  }

  document.getElementById('btn-draw').disabled = !(G.turn === 0 && G.phase === 'play');
  var unoBtn = document.getElementById('btn-uno');
  unoBtn.style.display = (G.ph.length === 2 && G.turn === 0 && G.phase === 'play' && !G.uno) ? 'inline-block' : 'none';
  document.getElementById('cpick').style.display = (G.phase === 'color') ? 'block' : 'none';
}

function startGame() {
  var deck = mkDeck(); shuffle(deck);
  G = {deck: deck, disc: [], ph: [], ai: [], col: CR, turn: 0, phase: 'play', uno: false, pendW: null};
  var i;
  for (i = 0; i < 7; i++) { G.ph.push(G.deck.pop()); G.ai.push(G.deck.pop()); }
  // Flip first card — no Wild+4
  var first;
  while (true) {
    first = G.deck.pop();
    if (first.t !== TW4) break;
    G.deck.unshift(first); shuffle(G.deck);
  }
  G.disc.push(first);
  G.col = (first.t === TW) ? CR : first.c;
  // Apply first-card effects (2-player: reverse = skip)
  if (first.t === TS || first.t === TR) {
    setMsg('首牌有效果，電腦先行。'); G.turn = 1;
  } else if (first.t === TD) {
    G.ph.push(draw1()); G.ph.push(draw1());
    setMsg('首牌 +2，你摸了 2 張，電腦先行。'); G.turn = 1;
  } else {
    setMsg('你先出牌。');
  }
  render();
  if (G.turn === 1) setTimeout(aiGo, 900);
}

function playerPlay(idx) {
  if (G.phase !== 'play' || G.turn !== 0) return;
  var card = G.ph[idx];
  if (!canPlay(card)) return;
  G.ph.splice(idx, 1);
  G.disc.push(card);
  if (card.t !== TW && card.t !== TW4) G.col = card.c;
  // Win check
  if (G.ph.length === 0) { setMsg('你贏了！'); G.phase = 'gameover'; render(); return; }
  // UNO penalty
  if (G.ph.length === 1 && !G.uno) {
    G.ph.push(draw1()); G.ph.push(draw1());
    setMsg('忘記說 UNO！罰摸 2 張。');
  }
  G.uno = false;
  // Wild: pick color first
  if (card.t === TW || card.t === TW4) { G.phase = 'color'; G.pendW = card.t; render(); return; }
  afterPlay(card, 1);
}

function afterPlay(card, next) {
  // next: who goes next normally — 0=player, 1=AI
  // In 2-player, skip/reverse = opponent skipped (current player goes again)
  if (card.t === TS || card.t === TR) {
    if (next === 1) { setMsg('電腦被跳過，你再出一張。'); G.turn = 0; render(); }
    else { setMsg('你被跳過，電腦行動。'); G.turn = 1; render(); setTimeout(aiGo, 900); }
    return;
  }
  if (card.t === TD) {
    if (next === 1) { G.ai.push(draw1()); G.ai.push(draw1()); setMsg('電腦摸了 +2，你再出。'); G.turn = 0; render(); }
    else { G.ph.push(draw1()); G.ph.push(draw1()); setMsg('你摸了 +2，電腦行動。'); G.turn = 1; render(); setTimeout(aiGo, 900); }
    return;
  }
  // Normal pass
  G.turn = next;
  if (next === 1) { setMsg('電腦思考中...'); render(); setTimeout(aiGo, 900); }
  else { setMsg('你的回合。'); render(); }
}

function pickColor(c) {
  G.col = c; G.phase = 'play';
  var w = G.pendW; G.pendW = null;
  if (w === TW4) {
    G.ai.push(draw1()); G.ai.push(draw1()); G.ai.push(draw1()); G.ai.push(draw1());
    setMsg('選' + colName(c) + '，電腦摸 +4，你再出。');
    G.turn = 0; render();
  } else {
    setMsg('選' + colName(c) + '，輪到電腦。');
    G.turn = 1; render(); setTimeout(aiGo, 900);
  }
}

function playerDraw() {
  if (G.phase !== 'play' || G.turn !== 0) return;
  var card = draw1();
  G.ph.push(card);
  var l = lbl(card).replace('\n', '');
  setMsg('摸了：' + l + (canPlay(card) ? '（可出）' : ''));
  G.turn = 1; render(); setTimeout(aiGo, 900);
}

function sayUno() { G.uno = true; setMsg('UNO!'); render(); }

function aiGo() {
  if (G.turn !== 1 || G.phase !== 'play') return;
  var i, card, idx = -1;
  // Prefer non-wild
  for (i = 0; i < G.ai.length; i++) {
    card = G.ai[i];
    if (canPlay(card) && card.t !== TW && card.t !== TW4) { idx = i; break; }
  }
  if (idx < 0) {
    for (i = 0; i < G.ai.length; i++) { if (canPlay(G.ai[i])) { idx = i; break; } }
  }
  if (idx < 0) {
    G.ai.push(draw1()); setMsg('電腦摸了一張牌。');
    G.turn = 0; render(); return;
  }
  card = G.ai[idx]; G.ai.splice(idx, 1); G.disc.push(card);
  if (card.t !== TW && card.t !== TW4) G.col = card.c;
  if (G.ai.length === 0) { setMsg('電腦出完牌，你輸了！'); G.phase = 'gameover'; render(); return; }
  // Wild: pick most frequent color in AI hand
  if (card.t === TW || card.t === TW4) {
    var freq = {R:0, B:0, G:0, Y:0}, cols = [CR, CB, CG, CY], best = CR, bestN = -1;
    for (i = 0; i < G.ai.length; i++) { if (freq[G.ai[i].c] !== undefined) freq[G.ai[i].c]++; }
    for (i = 0; i < 4; i++) { if (freq[cols[i]] > bestN) { bestN = freq[cols[i]]; best = cols[i]; } }
    G.col = best;
    if (card.t === TW4) {
      G.ph.push(draw1()); G.ph.push(draw1()); G.ph.push(draw1()); G.ph.push(draw1());
      setMsg('電腦出變色+4，選' + colName(best) + '，你摸 +4。');
      G.turn = 0; render(); return;
    }
    setMsg('電腦出變色，選' + colName(best) + '。');
  } else {
    setMsg('電腦出：' + lbl(card).replace('\n', ' '));
  }
  afterPlay(card, 0);
}

startGame();
</script>
</body>
</html>
